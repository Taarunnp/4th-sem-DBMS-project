# Render Blueprint — deploys the FastAPI backend.
# In Render you can either use this file (New + → Blueprint) or set the same
# values manually in the dashboard. Either way, add the MYSQL_* env vars from
# your Aiven service (they are NOT stored in this file, for security).

services:
  - type: web
    name: basketball-dbms-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MYSQL_HOST
        sync: false
      - key: MYSQL_PORT
        sync: false
      - key: MYSQL_USER
        sync: false
      - key: MYSQL_PASSWORD
        sync: false
      - key: MYSQL_DB
        sync: false
      - key: MYSQL_SSL
        value: "true"
